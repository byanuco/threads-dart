name: threads_sdk
description: A complete Dart SDK for the Threads API. Publish posts, manage replies, retrieve insights, handle OAuth, and more.
version: 0.1.1
homepage: https://github.com/byanuco/threads-dart
repository: https://github.com/byanuco/threads-dart
issue_tracker: https://github.com/byanuco/threads-dart/issues
topics:
  - threads
  - meta
  - social
  - api
  - oauth

environment:
  sdk: ^3.11.0

dependencies:
  http: ^1.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  build_runner: ^2.4.0
  coverage: ^1.15.0
  json_serializable: ^6.9.0
  lints: ^6.0.0
  test: ^1.25.0
